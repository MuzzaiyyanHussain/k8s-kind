kind: ReplicaSet
apiVersion: apps/v1
metadata: 
  name: nginx-replicaset
  namespace: nginx
spec: 
  replicas: 1
  selector:
     matchLabels:
       app: nginx

  template: 
    metadata:
      name: nginx-rep-pod
      labels:
        app: nginx

    spec: 
       containers:
          - name: nginx
            image: nginx:1.27.3
            ports:
              - containerPort: 80

